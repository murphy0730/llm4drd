<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LLM4DRD 智能调度平台</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
:root{--bg:#060a14;--sf:#0d1321;--cd:#121a2e;--bd:#1a2744;--ac:#2d7ff9;--gn:#0acf83;--or:#ff8c42;--rd:#ff4757;--pr:#7c5cfc;--cy:#00d2d3;--pk:#ff6b9d;--tx:#e0e6f0;--dm:#8492a6;--mt:#4a5568}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',system-ui;font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--mt);border-radius:3px}
.hd{background:linear-gradient(135deg,#0d1321,#121a2e);border-bottom:1px solid var(--bd);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.hd h1{font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--ac),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd .tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cy)}
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--sf);padding:0 16px;overflow-x:auto;gap:0}
.tab{padding:9px 14px;font-size:12px;cursor:pointer;color:var(--dm);border-bottom:2px solid transparent;white-space:nowrap;font-weight:500;transition:.15s}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-color:var(--ac);font-weight:700}
.ct{max-width:1300px;margin:0 auto;padding:16px 20px 60px}.page{display:none}.page.on{display:block}
.cd{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:16px 18px;margin-bottom:12px}
.ct2{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.g{display:grid;gap:8px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}
label.f{display:flex;flex-direction:column;gap:2px;font-size:11px;color:var(--dm)}
input,select{background:var(--sf);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-size:12px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--ac)}
.btn{padding:6px 16px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.btn:disabled{opacity:.3;cursor:not-allowed}
.b1{background:var(--ac)33;color:var(--ac)}.b2{background:var(--gn)33;color:var(--gn)}.b3{background:var(--or)33;color:var(--or)}
.b4{background:var(--rd)33;color:var(--rd)}.b5{background:var(--pr)33;color:var(--pr)}.b6{background:var(--cy)33;color:var(--cy)}
.bg{display:inline-block;padding:1px 8px;border-radius:3px;font-size:10px;font-weight:600}
.bg-g{background:var(--gn)22;color:var(--gn)}.bg-b{background:var(--ac)22;color:var(--ac)}.bg-r{background:var(--rd)22;color:var(--rd)}.bg-o{background:var(--or)22;color:var(--or)}.bg-p{background:var(--pr)22;color:var(--pr)}
table{width:100%;border-collapse:collapse;font-size:11px}th{padding:6px 8px;text-align:left;color:var(--dm);font-weight:600;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:4px 8px;border-bottom:1px solid var(--bd)44;white-space:nowrap}tr:hover td{background:var(--ac)08}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.mt{background:var(--sf);border-radius:6px;padding:10px 14px;border-left:3px solid var(--ac)}
.mt .lb{font-size:10px;color:var(--dm)}.mt .vl{font-size:18px;font-weight:800;margin-top:1px}
.log{background:#050810;border:1px solid var(--bd);border-radius:6px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;max-height:400px;overflow-y:auto;color:var(--dm);white-space:pre-wrap}
.log .i{color:var(--cy)}.log .g{color:var(--gn)}.log .w{color:var(--or)}.log .e{color:var(--rd)}.log .p{color:var(--pr)}
.gw{position:relative;overflow:hidden;border-radius:6px;background:var(--sf)}
.gt{position:absolute;background:var(--cd)f0;border:1px solid var(--bd);border-radius:6px;padding:8px 12px;font-size:10px;pointer-events:none;z-index:99;min-width:180;display:none}
.sp{display:inline-block;width:14px;height:14px;border:2px solid var(--mt);border-top-color:var(--ac);border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.llm-msg{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:10px 14px;margin-bottom:8px;font-size:11px}
.llm-msg .role{font-weight:700;margin-bottom:4px}.llm-msg pre{white-space:pre-wrap;max-height:200px;overflow-y:auto;background:#0008;padding:6px;border-radius:4px;margin-top:4px;font-size:10px}
td.editable{cursor:pointer;position:relative}td.editable:hover{background:var(--ac)15!important}
td.editable input{width:100%;background:var(--bg);border:1px solid var(--ac);padding:2px 4px;color:var(--tx);font-size:11px;border-radius:2px}
.sub-tabs{display:flex;gap:0;margin-bottom:10px;border-bottom:1px solid var(--bd)}
.sub-tab{padding:6px 12px;font-size:11px;cursor:pointer;color:var(--dm);border-bottom:2px solid transparent;font-weight:500}
.sub-tab:hover{color:var(--tx)}.sub-tab.on{color:var(--cy);border-color:var(--cy);font-weight:700}
.sub-page{display:none}.sub-page.on{display:block}
#cyGraph{width:100%;height:600px;border-radius:6px;background:#080c18}
.graph-legend{display:flex;gap:12px;flex-wrap:wrap;padding:8px 0;font-size:10px}
.graph-legend span{display:flex;align-items:center;gap:4px}
.graph-legend .ldot{width:10px;height:10px;border-radius:50%;display:inline-block}
.node-info{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:10px 14px;margin-top:8px;font-size:11px;display:none}
</style>
</head>
<body>
<div class="hd"><div><div class="tag">LLM4DRD · Dual-AI Scheduling Platform</div><h1>智能调度平台 v3</h1></div><div style="display:flex;gap:8px;align-items:center"><span id="stB" class="bg bg-b">未初始化</span><span id="sp" class="sp" style="display:none"></span></div></div>
<div class="tabs" id="tabs"></div>
<div class="ct" id="pages"></div>

<script>
const A='',OC=['#2d7ff9','#0acf83','#ff8c42','#ff4757','#7c5cfc','#ff6b9d','#00d2d3','#f97316','#14b8a6','#a855f7','#6366f1','#84cc16'];
let shop=null,lastGantt=null,cyInstance=null;

async function api(p,o={}){const r=await fetch(A+p,{headers:{'Content-Type':'application/json'},...o});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||r.statusText)}return r.json()}
function $(id){return document.getElementById(id)}
function show(v){$('sp').style.display=v?'inline-block':'none'}

// === TABS ===
const TABS=[
  {k:'inst',l:'📦 问题配置'},{k:'graph',l:'🔗 异构图'},{k:'sim',l:'⚡ 仿真排产'},{k:'cmp',l:'📊 规则对比'},
  {k:'pareto',l:'🎯 帕累托优化'},{k:'ai',l:'🤖 AI进化训练'},{k:'cfg',l:'⚙️ 大模型配置'}
];
$('tabs').innerHTML=TABS.map((t,i)=>`<div class="tab${i===0?' on':''}" data-k="${t.k}">${t.l}</div>`).join('');
$('tabs').onclick=e=>{const t=e.target.closest('.tab');if(!t)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));$('p-'+t.dataset.k).classList.add('on')};

// === PAGES ===
$('pages').innerHTML=`
<!-- INSTANCE -->
<div id="p-inst" class="page on">
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--cy)"></span>问题实例配置 — 订单/任务/工序/机器/班次</div>
<div class="g g5">
<label class="f">订单数<input id="c_ord" type="number" value="10" min="1" max="2000"></label>
<label class="f">每单任务数(最小)<input id="c_tmin" type="number" value="2" min="1"></label>
<label class="f">每单任务数(最大)<input id="c_tmax" type="number" value="5" min="1"></label>
<label class="f">每任务工序(最小)<input id="c_omin" type="number" value="2" min="1"></label>
<label class="f">每任务工序(最大)<input id="c_omax" type="number" value="5" min="1"></label>
<label class="f">每类机器台数<input id="c_mpt" type="number" value="3" min="1" max="50"></label>
<label class="f">交期松紧度<input id="c_due" type="number" value="1.5" step="0.1" min="0.3" max="5"></label>
<label class="f">到达分散度<input id="c_arr" type="number" value="0" step="0.1" min="0" max="2"></label>
<label class="f">白班小时<input id="c_ds" type="number" value="10" min="0" max="24"></label>
<label class="f">夜班小时<input id="c_ns" type="number" value="8" min="0" max="24"></label>
<label class="f">排程天数<input id="c_days" type="number" value="30" min="1"></label>
<label class="f">维修概率<input id="c_mp" type="number" value="0.05" step="0.01" min="0" max="1"></label>
<label class="f">随机种子<input id="c_seed" type="number" value="42"></label>
</div>
<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
<button class="btn b1" onclick="genInst()">🚀 生成实例</button>
<button class="btn b6" onclick="exportCSV()">📥 导出CSV</button>
<button class="btn b2" onclick="loadFromDB()">📂 从数据库加载</button>
<span style="border-left:1px solid var(--bd);height:20px;margin:0 4px"></span>
<button class="btn b3" onclick="showImportModal()">📤 导入Excel文件</button>
<a href="/api/instance/template" class="btn b6" style="text-decoration:none">📄 下载模板</a>
</div>
</div>
<!-- Excel Import Modal -->
<div id="csvModal" class="cd" style="display:none;border-color:var(--or)">
<div class="ct2"><span class="dot" style="background:var(--or)"></span>导入Excel文件 — 包含5个Sheet(orders/tasks/operations/machine_types/machines)</div>
<div style="font-size:11px;color:var(--dm);margin-bottom:8px">模板文件在项目 docs/instance_template.xlsx, 也可点击上方"下载模板"获取</div>
<div style="margin-bottom:10px">
<label class="f">选择Excel文件 (.xlsx)<input type="file" id="xlsx_file" accept=".xlsx,.xls"></label>
</div>
<div style="display:flex;gap:8px"><button class="btn b2" onclick="doImportExcel()">确认导入</button><button class="btn b4" onclick="$('csvModal').style.display='none'">取消</button></div>
<div id="importMsg" style="margin-top:6px;font-size:11px"></div>
</div>
<!-- Sub-tabs for instance data view -->
<div class="cd" id="instViewCard" style="display:none">
<div class="ct2"><span class="dot" style="background:var(--gn)"></span>实例数据 — 点击单元格可编辑</div>
<div class="sub-tabs" id="instSubTabs">
<div class="sub-tab on" data-k="overview">概览</div>
<div class="sub-tab" data-k="orders">订单</div>
<div class="sub-tab" data-k="tasks">任务</div>
<div class="sub-tab" data-k="ops">工序</div>
<div class="sub-tab" data-k="machines">机器</div>
</div>
<div id="instSubPages">
<div id="isp-overview" class="sub-page on"></div>
<div id="isp-orders" class="sub-page"></div>
<div id="isp-tasks" class="sub-page"></div>
<div id="isp-ops" class="sub-page"></div>
<div id="isp-machines" class="sub-page"></div>
</div>
</div>
<div id="instD"></div>
</div>

<!-- GRAPH -->
<div id="p-graph" class="page">
<div class="cd">
<div class="ct2"><span class="dot" style="background:var(--pr)"></span>异构图 — 分层有向异构图 (订单 → 任务 → 工序 → 机器)</div>
<div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
<button class="btn b5" onclick="buildGraph()">🔗 构建异构图</button>
<button class="btn b1" onclick="loadGraphData()">📂 加载已有图</button>
</div>
</div>
<div id="graphStats" class="cd" style="display:none">
<div class="ct2"><span class="dot" style="background:var(--cy)"></span>图统计信息</div>
<div id="graphStatsContent"></div>
</div>
<div class="cd" id="graphSearchCard" style="display:none">
<div class="ct2"><span class="dot" style="background:var(--ac)"></span>搜索节点和边</div>
<div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px">
<label class="f">搜索关键词<input id="g_search" type="text" placeholder="输入节点/边ID或关键词" onkeydown="if(event.key==='Enter')searchGraph()"></label>
<label class="f">节点类型<select id="g_node_type"><option value="">全部</option><option value="order">订单</option><option value="task">任务</option><option value="operation">工序</option><option value="machine">机器</option></select></label>
<label class="f">边类型<select id="g_edge_type"><option value="">全部</option><option value="order_has_task">订单→任务</option><option value="task_predecessor">任务前置</option><option value="task_has_operation">任务→工序</option><option value="operation_sequence">工序顺序</option><option value="op_depends_task">工序依赖任务</option><option value="machine_eligible">机器兼容</option></select></label>
<button class="btn b1" onclick="searchGraph()">🔍 搜索</button>
</div>
<div class="sub-tabs" id="graphSubTabs">
<div class="sub-tab on" data-k="gnodes">节点</div>
<div class="sub-tab" data-k="gedges">边</div>
</div>
<div id="graphSubPages">
<div id="gsp-gnodes" class="sub-page on"><div id="graphNodesContent"></div></div>
<div id="gsp-gedges" class="sub-page"><div id="graphEdgesContent"></div></div>
</div>
</div>
<div class="cd" id="graphVizCard" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px">
  <div class="ct2" style="margin-bottom:0"><span class="dot" style="background:var(--gn)"></span>图可视化 — 拖拽 | 滚轮缩放 | 单击高亮 | 双击聚焦</div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <label class="f" style="flex-direction:row;align-items:center;gap:4px">布局方向
      <select id="g_rankdir" onchange="applyLayout()" style="font-size:11px;padding:3px 6px">
        <option value="LR">左→右</option>
        <option value="TB">上→下</option>
      </select>
    </label>
    <label class="f" style="flex-direction:row;align-items:center;gap:4px">层间距
      <input id="g_ranksep" type="number" value="160" min="60" max="400" step="20" onchange="applyLayout()" style="width:60px;font-size:11px;padding:3px 6px">
    </label>
    <label class="f" style="flex-direction:row;align-items:center;gap:4px">节点间距
      <input id="g_nodesep" type="number" value="30" min="10" max="120" step="10" onchange="applyLayout()" style="width:60px;font-size:11px;padding:3px 6px">
    </label>
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer">
      <input type="checkbox" id="g_show_mach" checked onchange="toggleMachineEdges()"> 显示机器兼容边
    </label>
    <button class="btn b6" onclick="cyInstance&&cyInstance.fit(null,40)" style="padding:4px 10px">⊡ 适应屏幕</button>
    <button class="btn b3" onclick="applyLayout()" style="padding:4px 10px">↺ 重新布局</button>
  </div>
</div>
<div class="graph-legend">
  <span><span class="ldot" style="background:#00d2d3"></span>订单</span>
  <span><span class="ldot" style="background:#2d7ff9"></span>任务</span>
  <span><span class="ldot" style="background:#0acf83"></span>工序</span>
  <span><span class="ldot" style="background:#ff8c42"></span>机器</span>
  <span style="margin-left:10px;color:var(--dm);font-size:10px">边色: <span style="color:#2d7ff9">■</span>订单→任务 <span style="color:#ff4757">■</span>任务前置 <span style="color:#0acf83">■</span>任务→工序 <span style="color:#00d2d3">■</span>工序顺序 <span style="color:#7c5cfc">■</span>工序依赖 <span style="color:#ff8c42">■</span>机器兼容</span>
</div>
<div id="cyGraph"></div>
<div id="nodeInfo" class="node-info"></div>
</div>
</div>

<!-- SIMULATE -->
<div id="p-sim" class="page">
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--ac)"></span>仿真排产 — 选择规则运行</div>
<div style="display:flex;gap:10px;align-items:flex-end">
<label class="f">调度规则<select id="s_rule"><option>ATC</option><option>EDD</option><option>SPT</option><option>CR</option><option>FIFO</option><option>MST</option><option>LPT</option><option>PRIORITY</option><option>KIT_AWARE</option><option>BOTTLENECK</option><option>COMPOSITE</option></select></label>
<button class="btn b2" onclick="runSim()">▶ 运行仿真</button>
</div></div>
<div id="simR"></div>
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--dm)"></span>运行日志</div><div id="simL" class="log">等待运行...</div></div>
</div>

<!-- COMPARE -->
<div id="p-cmp" class="page">
<div class="cd"><button class="btn b3" onclick="runCmp()">📊 11条规则全对比</button></div>
<div id="cmpR"></div>
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--dm)"></span>运行日志</div><div id="cmpL" class="log">等待运行...</div></div>
</div>

<!-- PARETO -->
<div id="p-pareto" class="page">
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--pr)"></span>帕累托多目标优化</div>
<div style="font-size:11px;color:var(--dm);margin-bottom:8px">支持12种工业排产指标</div>
<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
<label class="f">目标1<select id="po1"><option value="total_tardiness">总延迟</option><option value="makespan">Makespan</option><option value="main_order_tardy_count">延误主订单数</option><option value="main_order_tardy_ratio">主订单延误比例</option><option value="critical_utilization">关键资源利用率</option><option value="total_wait_time">总等待时间</option><option value="avg_flowtime">平均流程时间</option></select></label>
<label class="f">目标2<select id="po2"><option value="critical_utilization">关键资源利用率</option><option value="makespan">Makespan</option><option value="total_tardiness">总延迟</option><option value="main_order_tardy_count">延误主订单数</option><option value="total_wait_time">总等待时间</option></select></label>
<button class="btn b5" onclick="runPareto()">🎯 计算帕累托前沿</button>
</div></div>
<div id="parR"></div>
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--dm)"></span>运行日志</div><div id="parL" class="log">等待运行...</div></div>
</div>

<!-- AI EVOLUTION -->
<div id="p-ai" class="page">
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--gn)"></span>🤖 双AI专家进化训练</div>
<div style="font-size:11px;color:var(--dm);margin-bottom:8px">LLM-A(算法专家)生成调度规则代码 + LLM-S(调度专家)评估指导改进</div>
<div style="display:flex;gap:10px;align-items:flex-end">
<label class="f">种群大小<input id="ai_pop" type="number" value="6" min="4" max="20"></label>
<label class="f">进化代数<input id="ai_gen" type="number" value="5" min="1" max="50"></label>
<label class="f">训练实例数<input id="ai_inst" type="number" value="3" min="1" max="10"></label>
<button class="btn b2" onclick="runTrain()">🧬 启动进化训练</button>
<button class="btn b6" onclick="loadLogs()">📋 查看LLM日志</button>
</div></div>
<div id="aiR"></div>
<div id="aiLogs"></div>
</div>

<!-- CONFIG -->
<div id="p-cfg" class="page">
<div class="cd"><div class="ct2"><span class="dot" style="background:var(--cy)"></span>大模型API配置</div>
<div style="font-size:11px;color:var(--dm);margin-bottom:8px">支持: OpenAI / DeepSeek / 通义千问 / 智谱GLM / Moonshot / Ollama / vLLM</div>
<div class="g g2">
<label class="f" style="grid-column:1/3">Base URL<input id="ll_url" type="text"></label>
<label class="f">API Key<input id="ll_key" type="password"></label>

function makeEditable(td,value,onSave){
  td.classList.add('editable');
  td.textContent=value;
  td.ondblclick=()=>{
    if(td.querySelector('input'))return;
    const inp=document.createElement('input');inp.value=td.textContent;
    td.textContent='';td.appendChild(inp);inp.focus();inp.select();
    const finish=()=>{const nv=inp.value;td.textContent=nv;if(onSave)onSave(nv)};
    inp.onblur=finish;
    inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){td.textContent=value;}}
  };
}

function renderGraphStats(meta){
  let h=`<div class="mg">`;
  h+=`<div class="mt" style="border-color:var(--cy)"><div class="lb">总节点</div><div class="vl" style="color:var(--cy)">${meta.total_nodes}</div></div>`;
  h+=`<div class="mt" style="border-color:var(--ac)"><div class="lb">总边</div><div class="vl" style="color:var(--ac)">${meta.total_edges}</div></div>`;
  h+=`</div><div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap">`;
  for(const[k,v] of Object.entries(meta.node_type_counts)){
    const c=NODE_COLORS[k]||'#888';
    h+=`<span class="bg" style="background:${c}22;color:${c}">${NODE_LABELS[k]||k}: ${v}</span>`;
  }
  h+=`</div><div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;font-size:10px">`;
  for(const[k,v] of Object.entries(meta.edge_type_counts)){
    h+=`<span class="bg bg-p">${EDGE_LABELS[k]||k}: ${v}</span>`;
  }
  h+=`</div>`;
  $('graphStatsContent').innerHTML=h;

async function searchGraph(){
  const search=$('g_search').value||'';
  const nodeType=$('g_node_type').value||'';
  const edgeType=$('g_edge_type').value||'';
  try{
    const np=new URLSearchParams();if(nodeType)np.set('node_type',nodeType);if(search)np.set('search',search);np.set('limit','200');
    const nodes=await api('/api/graph/nodes?'+np);
    renderGraphNodes(nodes);
    const ep=new URLSearchParams();if(edgeType)ep.set('edge_type',edgeType);if(search)ep.set('search',search);ep.set('limit','200');
    const edges=await api('/api/graph/edges?'+ep);
    renderGraphEdges(edges);
  }catch(e){}
}

function renderGraphNodes(data){
  let h=`<div style="font-size:10px;color:var(--dm);margin-bottom:4px">共 ${data.total} 个节点 (显示前200)</div>`;
  h+=`<div style="overflow-x:auto;max-height:400px;overflow-y:auto"><table><thead><tr><th>节点ID</th><th>类型</th><th>实体ID</th><th>属性</th></tr></thead><tbody>`;
  data.nodes.forEach(n=>{
    const at=Object.entries(n.attrs||{}).map(([k,v])=>`${k}=${v}`).join(', ');
    const c=NODE_COLORS[n.node_type]||'#888';
    h+=`<tr style="cursor:pointer" onclick="highlightNode('${n.node_id}')"><td class="mono">${n.node_id}</td><td><span class="bg" style="background:${c}22;color:${c}">${NODE_LABELS[n.node_type]||n.node_type}</span></td><td class="mono">${n.entity_id}</td><td style="font-size:10px;max-width:400px;overflow:hidden;text-overflow:ellipsis">${escH(at)}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  $('graphNodesContent').innerHTML=h;
}

function renderGraphEdges(data){
  let h=`<div style="font-size:10px;color:var(--dm);margin-bottom:4px">共 ${data.total} 条边 (显示前200)</div>`;
  h+=`<div style="overflow-x:auto;max-height:400px;overflow-y:auto"><table><thead><tr><th>源节点</th><th>目标节点</th><th>边类型</th></tr></thead><tbody>`;
  data.edges.forEach(e=>{
    h+=`<tr><td class="mono">${e.source}</td><td class="mono">${e.target}</td><td><span class="bg bg-p">${EDGE_LABELS[e.edge_type]||e.edge_type}</span></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  $('graphEdgesContent').innerHTML=h;
}

function highlightNode(nodeId){
  if(!cyInstance)return;
  const node=cyInstance.getElementById(nodeId);
  if(!node.length)return;
  // Reset all
  cyInstance.elements().removeClass('highlighted neighbor-node neighbor-edge dimmed');
  cyInstance.elements().addClass('dimmed');
  // Highlight selected + neighbors
  const neighborhood=node.neighborhood();
  node.removeClass('dimmed').addClass('highlighted');
  neighborhood.removeClass('dimmed').addClass('neighbor-node neighbor-edge');
  node.connectedEdges().removeClass('dimmed').addClass('neighbor-edge');
  // Animate focus
  cyInstance.animate({fit:{eles:node.union(neighborhood),padding:80}},{duration:400});
  // Show info
  showNodeInfo(node);
}

function showNodeInfo(node){
  const d=node.data();
  const info=$('nodeInfo');
  let h=`<b style="color:${NODE_COLORS[d.node_type]||'#fff'}">${d.id}</b> (${NODE_LABELS[d.node_type]||d.node_type})<br>`;
  h+=`实体ID: ${d.entity_id||''}<br>`;
  const skip=new Set(['id','node_type','entity_id','label']);
  for(const[k,v] of Object.entries(d)){if(!skip.has(k))h+=`${k}: ${v}<br>`}
  const edges=node.connectedEdges();
  h+=`<br>连接边: ${edges.length}条`;
  info.innerHTML=h;info.style.display='block';
}

// Dagre layout helper
function getDagreLayoutConfig(){
  const rankDir=$('g_rankdir')?$('g_rankdir').value:'LR';
  const rankSep=parseInt($('g_ranksep')?$('g_ranksep').value:160)||160;
  const nodeSep=parseInt($('g_nodesep')?$('g_nodesep').value:30)||30;
  return {
    name:'dagre',
    rankDir:rankDir,       // 'LR'=左→右(默认), 'TB'=上→下
    rankSep:rankSep,       // 各层之间的间距
    nodeSep:nodeSep,       // 同层节点之间的间距
    edgeSep:10,
    ranker:'tight-tree',   // 使同层节点排列更紧凑: network-simplex | tight-tree | longest-path
    animate:true,
    animationDuration:500,
    padding:40,
    fit:true,
  };
}

function applyLayout(){
  if(!cyInstance)return;
  cyInstance.layout(getDagreLayoutConfig()).run();
}

function toggleMachineEdges(){
  if(!cyInstance)return;
  const show=$('g_show_mach')&&$('g_show_mach').checked;
  cyInstance.edges('[edge_type="machine_eligible"]').style('display',show?'element':'none');
}

async function buildCyGraph(){
  // Fetch data (dagre handles up to ~300 nodes well; for larger graphs increase limits)
  const nodesR=await api('/api/graph/nodes?limit=300');
  const edgesR=await api('/api/graph/edges?limit=1200');
  const nodes=nodesR.nodes,edges=edgesR.edges;

  const elements=[];
  const nodeIds=new Set();

  // 节点: 按层设置 rank 提示让 dagre 排得更整齐
  const typeRank={order:0,task:1,operation:2,machine:3};
  nodes.forEach(n=>{
    nodeIds.add(n.node_id);
    const label=(n.attrs&&n.attrs.label)||n.entity_id||n.node_id.split(':')[1]||n.node_id;
    elements.push({data:{
      id:n.node_id,label:label,
      node_type:n.node_type,entity_id:n.entity_id,
      rank:typeRank[n.node_type]??2,
      ...(n.attrs||{})
    }});
  });

  // 边: 跳过两端节点不在当前集合中的
  edges.forEach(e=>{
    if(nodeIds.has(e.source)&&nodeIds.has(e.target)){
      elements.push({data:{
        id:'e'+e.id,source:e.source,target:e.target,edge_type:e.edge_type
      }});
    }
  });

  if(cyInstance){cyInstance.destroy();cyInstance=null}

  const showMachEdge=$('g_show_mach')?$('g_show_mach').checked:true;

  cyInstance=cytoscape({
    container:$('cyGraph'),
    elements:elements,
    style:[
      // ── 基础节点样式 ──
      {selector:'node',style:{
        'label':'data(label)',

function drawGantt(data){
  const c=$('gc');if(!c)return;const ctx=c.getContext('2d');
  const w=c.parentElement.clientWidth,ms=[...new Set(data.map(d=>d.machine_id))].sort();
  const rh=Math.min(28,Math.max(16,400/ms.length)),H=ms.length*rh+60;
  const dp=devicePixelRatio||1;c.width=w*dp;c.height=H*dp;c.style.width=w+'px';c.style.height=H+'px';ctx.scale(dp,dp);
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,w,H);
  const L=90,T=25,cW=w-L-16;
  const mn=Math.min(...data.map(d=>d.start)),mx=Math.max(...data.map(d=>d.end)),rng=mx-mn||1;
  const x=t=>L+(t-mn)/rng*cW;
  ctx.strokeStyle='#1a2744';ctx.lineWidth=.5;const tk=Math.min(10,Math.floor(cW/60));
  for(let i=0;i<=tk;i++){const tx=L+i/tk*cW;ctx.beginPath();ctx.moveTo(tx,T);ctx.lineTo(tx,H-10);ctx.stroke();ctx.fillStyle='#4a5568';ctx.font='9px JetBrains Mono';ctx.fillText(Math.round(mn+i/tk*rng)+'',tx-10,T-6)}
  ctx.font='10px sans-serif';ctx.fillStyle='#8492a6';
  ms.forEach((m,i)=>{ctx.fillText(m,2,T+i*rh+rh/2+3);if(i>0){ctx.beginPath();ctx.moveTo(L,T+i*rh);ctx.lineTo(w-16,T+i*rh);ctx.stroke()}});
  const ords=[...new Set(data.map(d=>d.order_id))];
  data.forEach(d=>{const mi=ms.indexOf(d.machine_id);if(mi<0)return;const bx=x(d.start),bw=Math.max(1,x(d.end)-x(d.start)),by=T+mi*rh+2,bh=rh-4;
    const ci=ords.indexOf(d.order_id)%OC.length;ctx.fillStyle=d.is_tardy?'#ff475777':OC[ci]+'88';ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle=d.is_tardy?'#ff4757':OC[ci];ctx.lineWidth=d.is_tardy?2:1;ctx.strokeRect(bx,by,bw,bh);
    if(bw>25){ctx.fillStyle='#fffc';ctx.font='8px JetBrains Mono';ctx.fillText(d.op_name||d.op_id.slice(-6),bx+2,by+bh/2+3)}});
  ctx.font='9px sans-serif';ords.slice(0,6).forEach((o,i)=>{ctx.fillStyle=OC[i%OC.length];ctx.fillRect(L+i*100,H-14,8,8);ctx.fillStyle='#8492a6';ctx.fillText(o,L+i*100+12,H-6)});
  c._gd={ms,rh,T,L,mn,rng,cW,data,ords};
  c.onmousemove=e=>{const g=c._gd;if(!g)return;const r2=c.getBoundingClientRect(),mx2=e.clientX-r2.left,my=e.clientY-r2.top;
    const mi=Math.floor((my-g.T)/g.rh),t=g.mn+(mx2-g.L)/g.cW*g.rng;
    const hit=g.data.find(d=>{const di=g.ms.indexOf(d.machine_id);return di===mi&&t>=d.start&&t<=d.end});
    const tip=$('gtt');if(hit){tip.style.display='block';tip.style.left=(mx2+12)+'px';tip.style.top=(my-8)+'px';
      tip.innerHTML=`<b>${hit.op_name}</b> (${hit.op_id})<br>任务: ${hit.task_id}<br>机器: ${hit.machine_name}<br>时间: ${hit.start}→${hit.end} (${hit.duration}h)<br>订单: ${hit.order_id} P${hit.priority}<br>交期: ${hit.due_date}${hit.is_tardy?'<br><b style="color:var(--rd)">延迟!</b>':''}${hit.is_main?'<br><b style="color:var(--or)">主任务</b>':''}`;
    }else{tip.style.display='none'}};
  c.onmouseleave=()=>{$('gtt').style.display='none'};
}

function drawBar(data){
  const c=$('cmpC');if(!c)return;const ctx=c.getContext('2d');const dp=devicePixelRatio||1;
  const W=c.parentElement.clientWidth,H=220;c.width=W*dp;c.height=H*dp;c.style.width=W+'px';c.style.height=H+'px';ctx.scale(dp,dp);
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
  const L2=60,T2=15,B2=35,n=data.length,bw=Math.floor((W-L2-20)/n*.7),gap=(W-L2-20)/n-bw;
  const mx=Math.max(...data.map(d=>d.metrics.total_tardiness));
  for(let i=0;i<=4;i++){const y=T2+(H-T2-B2)*(1-i/4);ctx.strokeStyle='#1a274444';ctx.beginPath();ctx.moveTo(L2,y);ctx.lineTo(W-10,y);ctx.stroke();ctx.fillStyle='#4a5568';ctx.font='9px JetBrains Mono';ctx.fillText(Math.round(mx*i/4)+'',2,y+3)}
  data.forEach((d,i)=>{const bx=L2+i*(bw+gap)+gap/2,bh=d.metrics.total_tardiness/mx*(H-T2-B2),by=H-B2-bh;
    ctx.fillStyle=i===0?'#0acf83aa':OC[i%OC.length]+'77';ctx.fillRect(bx,by,bw,bh);
    ctx.save();ctx.translate(bx+bw/2,H-B2+10);ctx.rotate(-.4);ctx.fillStyle='#8492a6';ctx.font='9px sans-serif';ctx.fillText(d.rule,0,0);ctx.restore()});
}

// === PARETO ===
async function runPareto(){
  const log=$('parL');log.textContent='';const L=(c,m)=>{log.innerHTML+=`<span class="${c}">${m}</span>\n`;log.scrollTop=9e9};
  show(1);try{
    const o1=$('po1').value,o2=$('po2').value;L('i',`[开始] ${o1} vs ${o2}`);
    const r=await api('/api/pareto/optimize',{method:'POST',body:JSON.stringify({objectives:[o1,o2]})});
    L('g',`[完成] ${r.solutions.length}方案, 帕累托前沿${r.pareto_front.length}个`);
    let h=`<div class="cd"><div class="ct2"><span class="dot" style="background:var(--pr)"></span>帕累托散点图 — ${r.labels[0]} vs ${r.labels[1]}</div><canvas id="parC" height="350"></canvas></div>`;
    h+=`<div class="cd"><div class="ct2"><span class="dot" style="background:var(--pr)"></span>明细</div><div style="overflow-x:auto"><table><thead><tr><th>规则</th><th>${r.labels[0]}</th><th>${r.labels[1]}</th><th>帕累托</th><th>支配层</th></tr></thead><tbody>`;
    r.solutions.sort((a,b)=>a.rank-b.rank).forEach(s=>{h+=`<tr style="background:${s.is_pareto?'var(--gn)11':''}"><td><span class="bg ${s.is_pareto?'bg-g':'bg-b'}">${s.rule}</span></td><td class="mono">${s[r.objectives[0]]?.toFixed?.(2)}</td><td class="mono">${s[r.objectives[1]]?.toFixed?.(2)}</td><td>${s.is_pareto?'✅':''}</td><td>${s.rank}</td></tr>`});
    h+=`</tbody></table></div></div>`;
    $('parR').innerHTML=h;setTimeout(()=>drawPareto(r),50);
  }catch(e){L('e','[错误] '+e.message)}show(0)}

function drawPareto(data){
  const c=$('parC');if(!c)return;const ctx=c.getContext('2d');const dp=devicePixelRatio||1;
  const W=c.parentElement.clientWidth,H=350;c.width=W*dp;c.height=H*dp;c.style.width=W+'px';c.style.height=H+'px';ctx.scale(dp,dp);
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
  const o1=data.objectives[0],o2=data.objectives[1],pts=data.solutions;
  const v1=pts.map(p=>p[o1]||0),v2=pts.map(p=>p[o2]||0);
  const mn1=Math.min(...v1)*.95,mx1=Math.max(...v1)*1.05,mn2=Math.min(...v2)*.95,mx2=Math.max(...v2)*1.05;
  const L2=70,R2=20,T2=20,B2=45,cW=W-L2-R2,cH=H-T2-B2;
  const x=v=>L2+(v-mn1)/(mx1-mn1)*cW,y=v=>T2+cH-(v-mn2)/(mx2-mn2)*cH;
  ctx.strokeStyle='#1a2744';ctx.lineWidth=.5;
  for(let i=0;i<=5;i++){const gx=L2+i/5*cW,gy=T2+i/5*cH;ctx.beginPath();ctx.moveTo(gx,T2);ctx.lineTo(gx,H-B2);ctx.stroke();ctx.beginPath();ctx.moveTo(L2,gy);ctx.lineTo(W-R2,gy);ctx.stroke();
    ctx.fillStyle='#4a5568';ctx.font='9px JetBrains Mono';ctx.fillText((mn1+(mx1-mn1)*i/5).toFixed(0),gx-10,H-B2+14);ctx.fillText((mn2+(mx2-mn2)*(1-i/5)).toFixed(1),2,gy+3)}
  ctx.fillStyle='#8492a6';ctx.font='11px sans-serif';ctx.fillText(data.labels[0],W/2-20,H-6);
  ctx.save();ctx.translate(12,H/2);ctx.rotate(-Math.PI/2);ctx.fillText(data.labels[1],0,0);ctx.restore();
  const fr=pts.filter(p=>p.is_pareto).sort((a,b)=>(a[o1]||0)-(b[o1]||0));
  if(fr.length>1){ctx.strokeStyle='#0acf8344';ctx.lineWidth=2;ctx.setLineDash([5,3]);ctx.beginPath();ctx.moveTo(x(fr[0][o1]),y(fr[0][o2]));fr.slice(1).forEach(p=>ctx.lineTo(x(p[o1]),y(p[o2])));ctx.stroke();ctx.setLineDash([])}
  pts.forEach(p=>{const px=x(p[o1]||0),py=y(p[o2]||0),r2=p.is_pareto?7:4;ctx.beginPath();ctx.arc(px,py,r2,0,Math.PI*2);ctx.fillStyle=p.is_pareto?'#0acf83':'#4a5568';ctx.fill();if(p.is_pareto){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke()}
    ctx.fillStyle=p.is_pareto?'#e0e6f0':'#8492a6';ctx.font='9px sans-serif';ctx.fillText(p.rule,px+r2+3,py+3)});
}

async function loadLogs(){

    if(r.best){h+=`<div class="cd"><div class="ct2"><span class="dot" style="background:var(--gn)"></span>最优规则 (fitness=${r.best.fitness.toFixed(1)})</div><pre style="background:#050810;padding:10px;border-radius:6px;font-size:11px;max-height:200px;overflow:auto;color:var(--gn)">${r.best.code}</pre></div>`}
    if(r.history&&r.history.length){h+=`<div class="cd"><div class="ct2"><span class="dot" style="background:var(--ac)"></span>进化历史</div><table><thead><tr><th>代</th><th>最优</th><th>平均</th></tr></thead><tbody>`;
      r.history.forEach(g=>{h+=`<tr><td>${g.gen}</td><td class="mono" style="color:var(--gn)">${g.best}</td><td class="mono">${g.avg}</td></tr>`});h+=`</tbody></table></div>`}
    if(r.logs&&r.logs.length){h+=`<div class="cd"><div class="ct2"><span class="dot" style="background:var(--pr)"></span>LLM调用日志 (${r.logs.length}条)</div>`;
      r.logs.forEach(l=>{const rc=l.role==='LLM-A'?'var(--gn)':l.role==='LLM-S'?'var(--pr)':'var(--dm)';
        h+=`<div class="llm-msg"><div class="role" style="color:${rc}">${l.role} · ${l.action} · Gen${l.generation} · ${l.duration_s}s</div><details><summary style="cursor:pointer;color:var(--dm);font-size:10px">Prompt</summary><pre>${escH(l.prompt)}</pre></details><details open><summary style="cursor:pointer;color:var(--dm);font-size:10px">Response</summary><pre>${escH(l.response)}</pre></details></div>`});h+=`</div>`}
    $('aiLogs').innerHTML=h||'<div class="cd" style="color:var(--dm)">暂无训练记录</div>';
  }catch(e){$('aiLogs').innerHTML=`<div class="cd" style="color:var(--rd)">${e.message}</div>`}show(0)}

function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// === CONFIG ===
async function loadCfg(){try{const r=await api('/api/config/llm');$('ll_url').value=r.base_url||'';$('ll_mod').value=r.model||'';$('ll_key').placeholder=r.has_key?'已配置('+r.preview+')':'未配置'}catch(e){}}
async function saveCfg(){try{const b={};const u=$('ll_url').value;if(u)b.base_url=u;const k=$('ll_key').value;if(k)b.api_key=k;const m=$('ll_mod').value;if(m)b.model=m;await api('/api/config/llm',{method:'PUT',body:JSON.stringify(b)});$('cfgS').innerHTML='<span style="color:var(--gn)">已保存</span>';loadCfg()}catch(e){$('cfgS').innerHTML='<span style="color:var(--rd)">'+e.message+'</span>'}}
async function testLLM(){$('cfgS').innerHTML='<span class="sp"></span> 测试中...';try{const r=await api('/api/config/llm/test',{method:'POST'});$('cfgS').innerHTML=r.status==='ok'?`<span style="color:var(--gn)">${r.model}: "${r.response}"</span>`:`<span style="color:var(--rd)">${r.msg}</span>`}catch(e){$('cfgS').innerHTML='<span style="color:var(--rd)">'+e.message+'</span>'}}

const PS=[{n:'OpenAI',u:'https://api.openai.com/v1',m:'gpt-4o'},{n:'DeepSeek',u:'https://api.deepseek.com/v1',m:'deepseek-chat'},{n:'通义千问',u:'https://dashscope.aliyuncs.com/compatible-mode/v1',m:'qwen-max'},{n:'智谱GLM',u:'https://open.bigmodel.cn/api/paas/v4',m:'glm-4-plus'},{n:'Moonshot',u:'https://api.moonshot.cn/v1',m:'moonshot-v1-128k'},{n:'Ollama',u:'http://localhost:11434/v1',m:'qwen2.5:72b'}];
$('presets').innerHTML=PS.map(p=>`<div style="background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;cursor:pointer" onclick="$('ll_url').value='${p.u}';$('ll_mod').value='${p.m}'"><div style="font-weight:700;color:var(--or);font-size:12px">${p.n}</div><div style="font-size:10px;color:var(--dm)">${p.u}</div></div>`).join('');
loadCfg();
</script>
